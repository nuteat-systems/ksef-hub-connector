name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Connector.sln

      - name: Build
        run: dotnet build Connector.sln -c Release --no-restore

      - name: Test
        run: dotnet test Connector.Tests/Connector.Tests.csproj -c Release --no-build --verbosity normal
